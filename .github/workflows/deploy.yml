name: Deploy to GCP VM

# Trigger this pipeline only when someone pushes to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull your repository code onto the GitHub virtual runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Open an SSH connection to your GCP VM and execute build commands
    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_VM_IP }}
        username: ${{ secrets.GCP_SSH_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        port: 22
        script: |
          # Navigate into your repository folder on the VM
          cd ~/react_fastapi_boilerplate
          
          # Pull down the latest code changes from GitHub
          git pull origin main
          
          # Rebuild and launch the updated Docker containers silently
          sudo docker-compose down
          sudo docker-compose up -d --build